<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChantierPro v5</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2137;--navy2:#1a3a5c;--navy3:#2a5a8c;
  --ink:#1a1a2e;--ink2:#4a5568;--ink3:#8a9ab0;
  --paper:#f7f8fc;--paper2:#eef0f5;--paper3:#dde1ea;
  --green:#1a7a4a;--green2:#e6f5ed;
  --blue:#1e4a8a;--blue2:#e6eef8;
  --orange:#c06010;--orange2:#fff3e6;
  --red:#8a1a1a;--red2:#fde8e8;
  --gold:#8a6500;--gold2:#fff9e6;
  --radius:10px;--radius-lg:16px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.14);
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
.header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:52px;flex-shrink:0;gap:12px}
.logo{font-weight:700;font-size:15px;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#4af0a0}
.header-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0}
.sync-dot.synced{background:#4af0a0}
.sync-dot.syncing{background:#f0a04a;animation:pulse 1s infinite}
.sync-dot.offline{background:#f04a4a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:11px;color:#8ab0d0;font-family:'IBM Plex Mono',monospace}
.hbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:5px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.hbtn:hover{background:rgba(255,255,255,0.2)}
.hbtn.primary{background:var(--navy3);border-color:var(--navy3)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:240px;background:var(--navy2);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-section{padding:14px 12px 6px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#5a8ab0}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-radius:8px;margin:1px 6px;color:#c0d8f0;font-size:13px;transition:all .15s;position:relative}
.nav-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,0.12);color:#fff}
.nav-item .nav-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.nav-item .nav-name{font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .nav-meta{font-size:10px;color:#5a8ab0;font-family:'IBM Plex Mono',monospace}
.nav-mini-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:3px}
.nav-mini-fill{height:100%;background:#4af0a0;border-radius:2px;transition:width .3s}
.nav-del{background:none;border:none;color:#5a8ab0;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;opacity:0;transition:all .15s;flex-shrink:0}
.nav-item:hover .nav-del{opacity:1}
.nav-del:hover{color:#f04a4a;background:rgba(240,74,74,0.15)}
.add-project-btn{margin:8px;padding:9px 12px;background:rgba(255,255,255,0.06);border:1px dashed rgba(255,255,255,0.2);border-radius:8px;color:#8ab0d0;font-size:12px;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.add-project-btn:hover{background:rgba(255,255,255,0.1);color:#fff}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:1.5rem}

/* ── DASHBOARD ── */
.page-title{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink3);margin-bottom:1.5rem}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat-card{background:#fff;border-radius:var(--radius-lg);padding:1rem 1.1rem;box-shadow:var(--shadow);border:1px solid var(--paper3)}
.stat-val{font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--navy2)}
.stat-label{font-size:11px;color:var(--ink3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.proj-card{background:#fff;border-radius:var(--radius-lg);padding:1.1rem;box-shadow:var(--shadow);border:1px solid var(--paper3);cursor:pointer;transition:all .2s}
.proj-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.proj-card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.proj-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.proj-icon.apt{background:var(--blue2)}
.proj-icon.go{background:var(--orange2)}
.proj-card-name{font-weight:600;font-size:14px}
.proj-card-type{font-size:11px;color:var(--ink3)}
.proj-pct{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--navy2)}
.prog-bar{height:6px;background:var(--paper3);border-radius:3px;overflow:hidden;margin:8px 0 6px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy3),#4af0a0);border-radius:3px;transition:width .5s}
.proj-stats{display:flex;gap:12px;font-size:11px;color:var(--ink3)}
.proj-stat-done{color:var(--green);font-weight:600}

/* ── ALERTS ── */
.alert-card{background:#fff;border-radius:var(--radius-lg);padding:1.1rem 1.25rem;box-shadow:var(--shadow);border:1px solid var(--paper3);margin-bottom:1.5rem}
.alert-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:10px}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--paper2)}
.alert-item:last-child{border-bottom:none}
.alert-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:1px}
.badge-red{background:var(--red2);color:var(--red)}
.badge-blue{background:var(--blue2);color:var(--blue)}
.badge-orange{background:var(--orange2);color:var(--orange)}
.badge-green{background:var(--green2);color:var(--green)}
.alert-text{font-size:12px;color:var(--ink2)}
.alert-proj{font-size:11px;color:var(--ink3)}

/* ── CHECKLIST ── */
.cl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.cl-title-group .cl-type{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px}
.cl-title-group .cl-name{font-size:20px;font-weight:700}
.cl-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-ghost{background:var(--paper2);color:var(--ink2);border:1px solid var(--paper3)}
.btn-ghost:hover{background:var(--paper3)}
.btn-primary{background:var(--navy2);color:#fff}
.btn-primary:hover{background:var(--navy3)}
.btn-add{background:var(--blue2);color:var(--blue);border:1px solid #c0d8f0}
.btn-add:hover{background:#d0e6f8}

/* Progress overview */
.prog-overview{background:#fff;border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);border:1px solid var(--paper3)}
.prog-overview-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-overview-label{font-size:12px;font-weight:600;color:var(--ink2)}
.prog-overview-val{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--navy2);font-weight:600}
.prog-main{height:8px;background:var(--paper3);border-radius:4px;overflow:hidden}
.prog-main-fill{height:100%;background:linear-gradient(90deg,var(--navy2),#4af0a0);border-radius:4px;transition:width .5s}

/* Budget bar */
.budget-bar{background:#fff;border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);border:1px solid var(--paper3)}
.budget-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.budget-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3)}
.budget-val{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--green)}
.budget-max{font-size:11px;color:var(--ink3);font-weight:400}
.budget-track{height:10px;background:var(--paper3);border-radius:5px;overflow:hidden;display:flex;margin-bottom:8px}
.budget-seg{height:100%;transition:width .4s}
.budget-legend{display:flex;gap:14px;flex-wrap:wrap}
.budget-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)}
.budget-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.budget-toggle{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--paper2)}
.toggle-sw{position:relative;width:34px;height:18px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-sl{position:absolute;inset:0;background:var(--paper3);border-radius:18px;cursor:pointer;transition:.2s}
.toggle-sl:before{content:'';position:absolute;width:12px;height:12px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-sw input:checked+.toggle-sl{background:var(--blue)}
.toggle-sw input:checked+.toggle-sl:before{transform:translateX(16px)}
.toggle-text{font-size:11px;color:var(--ink3)}
.toggle-text strong{color:var(--ink2)}

/* Step blocks */
.step-block{background:#fff;border-radius:var(--radius-lg);margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--paper3);overflow:hidden;transition:box-shadow .2s}
.step-block.open{box-shadow:var(--shadow-lg)}
.step-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.step-move{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.move-btn{background:none;border:1px solid var(--paper3);border-radius:4px;width:20px;height:16px;font-size:8px;cursor:pointer;color:var(--ink3);padding:0;line-height:1;display:flex;align-items:center;justify-content:center}
.move-btn:hover:not(:disabled){background:var(--paper2);color:var(--ink1)}
.move-btn:disabled{opacity:.2;cursor:default}
.step-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0;background:var(--paper2);color:var(--ink3)}
.step-num.done{background:var(--green2);color:var(--green)}
.step-num.inprogress{background:var(--orange2);color:var(--orange)}
.step-num.can{background:var(--blue2);color:var(--blue)}
.step-info{flex:1;min-width:0}
.step-name{font-size:13px;font-weight:600;color:var(--ink)}
.step-remark{font-size:11px;color:var(--ink3);margin-top:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.phase-tag{padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700}
.phase-go{background:var(--orange2);color:var(--orange)}
.phase-couvert{background:var(--blue2);color:var(--blue)}
.phase-para{background:var(--green2);color:var(--green)}
.debl-badge{background:var(--gold2);border:1px solid #e0c050;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:var(--gold);display:inline-flex;align-items:center;gap:3px}
.debl-input{width:52px;border:none;background:transparent;font-size:10px;font-weight:700;color:var(--gold);font-family:'IBM Plex Mono',monospace;text-align:center;outline:none}
.step-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.sb-done{background:var(--green2);color:var(--green)}
.sb-can{background:var(--blue2);color:var(--blue)}
.sb-blocked{background:var(--red2);color:var(--red)}
.sb-prog{background:var(--orange2);color:var(--orange)}
.step-del-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--ink3);opacity:0;padding:4px;border-radius:6px;transition:all .15s;flex-shrink:0}
.step-header:hover .step-del-btn{opacity:.5}
.step-del-btn:hover{opacity:1!important;color:var(--red);background:var(--red2)}
.chevron{font-size:10px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.step-block.open .chevron{transform:rotate(180deg)}

/* Step body */
.step-body{padding:0 14px 14px;border-top:1px solid var(--paper2)}
.prereq-list{margin:10px 0 6px}
.prereq-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--paper2)}
.prereq-item:last-child{border-bottom:none}
.prereq-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--paper3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.prereq-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.prereq-text{font-size:12px;color:var(--ink2);flex:1;cursor:pointer}
.prereq-text.checked{text-decoration:line-through;color:var(--ink3)}
.prereq-del-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--ink3);opacity:0;padding:2px 5px;border-radius:4px}
.prereq-item:hover .prereq-del-btn{opacity:.5}
.prereq-del-btn:hover{opacity:1!important;color:var(--red);background:var(--red2)}
.add-prereq-row{display:flex;gap:6px;margin:8px 0 4px}
.add-prereq-inp{flex:1;border:1.5px dashed var(--paper3);border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit;color:var(--ink);background:var(--paper);outline:none}
.add-prereq-inp:focus{border-color:var(--blue);border-style:solid;background:#fff}
.add-prereq-inp::placeholder{color:var(--ink3)}
.add-prereq-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.note-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);display:block;margin:10px 0 4px}
.note-inp{width:100%;border:1.5px solid var(--paper3);border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:56px;outline:none;background:var(--paper)}
.note-inp:focus{border-color:var(--blue);background:#fff}
.step-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.step-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.step-btn-grey{background:var(--paper2);color:var(--ink2);border:1px solid var(--paper3)}
.step-btn-grey:hover{background:var(--paper3)}
.step-btn-blue{background:var(--blue2);color:var(--blue);border:1px solid #c0d8f0}
.step-btn-blue:hover{background:#d0e6f8}
.step-btn-green{background:var(--green2);color:var(--green);border:1px solid #a0d8b8}
.step-btn-green:hover{background:#c0e8d0}

/* ── RAPPORT ── */
.rapport-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.rcard{background:#fff;border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow);border:1px solid var(--paper3)}
.rcard-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:12px}
.rapport-full{margin-bottom:14px}
.pie-wrap{display:flex;align-items:center;gap:1.5rem}
.pie-container{position:relative;flex-shrink:0}
.pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pie-pct{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--ink)}
.pie-pct-label{font-size:10px;color:var(--ink3)}
.pie-legend{display:flex;flex-direction:column;gap:7px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-val{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ink);margin-left:auto}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-name{font-size:12px;color:var(--ink2);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:8px;background:var(--paper3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--navy2),var(--navy3));border-radius:4px;transition:width .5s}
.bar-pct{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--ink3);width:36px;text-align:right}
.next-table{width:100%;border-collapse:collapse;font-size:12px}
.next-table th{text-align:left;padding:4px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);border-bottom:1px solid var(--paper3)}
.next-table td{padding:7px 8px;border-bottom:1px solid var(--paper2)}
.next-table tr:last-child td{border-bottom:none}
.next-table tr{cursor:pointer;transition:background .15s}
.next-table tr:hover td{background:var(--paper)}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.22);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-10px) scale(.97)}to{opacity:1;transform:none}}
.modal-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:1.1rem;padding-bottom:.8rem;border-bottom:1px solid var(--paper3)}
.modal-field{margin-bottom:.9rem}
.modal-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:5px}
.modal-input{width:100%;padding:8px 11px;border:1.5px solid var(--paper3);border-radius:9px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--paper);outline:none;transition:border .15s}
.modal-input:focus{border-color:var(--blue);background:#fff}
.modal-input::placeholder{color:var(--ink3)}
textarea.modal-input{resize:vertical;min-height:72px;line-height:1.5}
.modal-row{display:flex;gap:10px}
.modal-row .modal-field{flex:1}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--paper3)}
.modal-btn{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.modal-btn-cancel{background:var(--paper2);color:var(--ink2);border:1.5px solid var(--paper3)}
.modal-btn-cancel:hover{background:var(--paper3)}
.modal-btn-ok{background:var(--navy2);color:#fff}
.modal-btn-ok:hover{background:var(--navy3)}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:500;transform:translateY(100px);opacity:0;transition:all .25s;z-index:1000;box-shadow:var(--shadow-lg);pointer-events:none}
.toast.show{transform:none;opacity:1}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--ink3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:14px}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .sidebar{width:200px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .rapport-grid{grid-template-columns:1fr}
}
@media(max-width:500px){
  .sidebar{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
  .main{padding:1rem}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo"><span class="logo-dot"></span>ChantierPro <span style="opacity:.4;font-weight:400;font-size:12px">v5</span></div>
  <div class="header-right">
    <div class="sync-dot offline" id="syncDot"></div>

// ════════════════════════════════════════════════════════
//  STATE — everything stored here, synced to Firebase
// ════════════════════════════════════════════════════════
// Project shape:
// {
//   id: number,
//   name: string,
//   type: 'apt'|'go',
//   createdAt: string,
//   customBudget: bool,
//   // Per-step state (indexed by step position in effective list):
//   stepState: [ {done,inprogress,open,note,checked:[]} ],
//   // User customizations (all persisted):
//   customSteps: [ {name,remark,debl,phase,prereqs[]} ],
//   prereqOverrides: { "stepIdx": ["prereq1","prereq2"] },
//   deblOverrides: { "stepIdx": number },
//   deletedBaseSteps: [idx,...],
//   stepOrder: [idx,...] | null
// }

let STATE = { projects: [], view: 'dash', pid: null };
let _syncing = false;

// ── Effective steps for a project — pure function, never touches TEMPLATES ──
function effectiveSteps(p) {
  const base = TEMPLATES[p.type].steps;
  const deleted = new Set(p.deletedBaseSteps || []);
  const overrides = p.prereqOverrides || {};
  // Build list: base steps (minus deleted) + custom steps
  let steps = [];
  base.forEach((s, i) => {
    if (deleted.has(i)) return;
    steps.push({
      name: s.name,
      remark: s.remark,
      debl: s.debl,
      phase: s.phase,
      prereqs: overrides[i] !== undefined ? overrides[i] : s.prereqs,
      _baseIdx: i,
      _custom: false
    });
  });
  (p.customSteps || []).forEach((s, ci) => {
    steps.push({ ...s, _baseIdx: null, _custom: true, _customIdx: ci });
  });
  // Apply order if set
  if (p.stepOrder && p.stepOrder.length === steps.length) {
    steps = p.stepOrder.map(i => steps[i]);
  }
  // Apply debl overrides
  if (p.customBudget && p.deblOverrides) {
    steps = steps.map((s, i) => {
      const v = p.deblOverrides[i];
      return v !== undefined ? { ...s, debl: v } : s;
    });
  }
  return steps;
}

// Ensure stepState array matches effective steps count
function syncStepState(p) {
  const steps = effectiveSteps(p);
  if (!p.stepState) p.stepState = [];
  while (p.stepState.length < steps.length) {
    const s = steps[p.stepState.length];
    p.stepState.push({ done: false, inprogress: false, open: false, note: '', checked: new Array((s.prereqs||[]).length).fill(false) });
  }
  // Trim if shorter (step was deleted)
  if (p.stepState.length > steps.length) p.stepState.length = steps.length;
  // Ensure checked array length matches prereqs
  steps.forEach((s, i) => {
    const pLen = (s.prereqs||[]).length;
    if (!p.stepState[i]) return;
    while (p.stepState[i].checked.length < pLen) p.stepState[i].checked.push(false);
    if (p.stepState[i].checked.length > pLen) p.stepState[i].checked.length = pLen;
  });
}

function getStep(p, i) { return (effectiveSteps(p))[i]; }

function stepStatus(p, i) {
  const ss = p.stepState[i];
  if (!ss) return 'blocked';
  if (ss.done) return 'done';
  if (ss.inprogress) return 'inprogress';
  const s = getStep(p, i);
  const prereqs = s.prereqs || [];
  if (prereqs.length === 0) return 'can';
  if (ss.checked.filter(Boolean).length >= prereqs.length) return 'can';
  return 'blocked';
}

function progress(p) {
  syncStepState(p);
  const steps = effectiveSteps(p);
  const done = p.stepState.filter(s => s.done).length;
  const total = steps.length;
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

// ════════════════════════════════════════════════════════
//  FIREBASE SYNC
// ════════════════════════════════════════════════════════
function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + s;
  lbl.textContent = { synced:'Synchronisé', syncing:'Sync...', offline:'Offline' }[s] || s;
}

function save() {
  if (_syncing) return;
  setSyncStatus('syncing');
  fbSave({ projects: STATE.projects, updatedAt: Date.now() })
    .then(() => setSyncStatus('synced'))
    .catch(() => setSyncStatus('offline'));
}

// Start listener
setSyncStatus('syncing');
fbListen(data => {
  _syncing = true;
  if (data && data.projects) {
    STATE.projects = data.projects;
  }
  setSyncStatus('synced');
  render();
  setTimeout(() => { _syncing = false; }, 200);
});

  document.getElementById('navDash').classList.toggle('active', STATE.view === 'dash');
  document.getElementById('navReport').classList.toggle('active', STATE.view === 'report');
  const total = STATE.projects.reduce((a,p)=>{const pr=progress(p);return a+pr.total},0);
  const done  = STATE.projects.reduce((a,p)=>{const pr=progress(p);return a+pr.done},0);
  document.getElementById('dashMeta').textContent =
    STATE.projects.length === 0 ? 'Aucun chantier' : `${STATE.projects.length} chantier${STATE.projects.length>1?'s':''} · ${done}/${total}`;
  document.getElementById('projectList').innerHTML = STATE.projects.map(p => {
    const pr = progress(p);
    const tmpl = TEMPLATES[p.type];
    const active = STATE.view === 'project' && STATE.pid === p.id;
    return `<div class="nav-item ${active?'active':''}" onclick="goPid(${p.id})">
      <span class="nav-icon">${tmpl.icon}</span>
      <div style="flex:1;min-width:0">

        <div class="nav-meta">${pr.done}/${pr.total} étapes</div>
        <div class="nav-mini-bar"><div class="nav-mini-fill" style="width:${pr.pct}%"></div></div>
      </div>
      <button class="nav-del" onclick="event.stopPropagation();delProject(${p.id})">×</button>
    </div>`;
  }).join('');
}

// ── DASHBOARD ──
function renderDash() {
  const m = document.getElementById('main');
  const total = STATE.projects.reduce((a,p)=>a+progress(p).total,0);
  const done  = STATE.projects.reduce((a,p)=>a+progress(p).done,0);
  const inprog = STATE.projects.reduce((a,p)=>{
    syncStepState(p);
    return a + p.stepState.filter((ss,i)=>stepStatus(p,i)==='inprogress').length;
  },0);
  const blocked = STATE.projects.reduce((a,p)=>{
    syncStepState(p);
    return a + p.stepState.filter((ss,i)=>stepStatus(p,i)==='blocked'&&!ss.done&&!ss.inprogress).length;
  },0);

  // Next steps and blocked steps for alert panel
  let nextItems = [], blockedItems = [];
  STATE.projects.forEach(p => {
    syncStepState(p);
    const steps = effectiveSteps(p);
    steps.forEach((s, i) => {
      const st = stepStatus(p, i);
      if ((st === 'can' || st === 'inprogress') && nextItems.length < 6)
        nextItems.push({ p, s, i, st });
      if (st === 'blocked' && blockedItems.length < 6)
        blockedItems.push({ p, s, i });
    });
  });

  const projCards = STATE.projects.length === 0
    ? `<div class="empty"><div class="empty-icon">🏗</div><div class="empty-text">Aucun chantier — créez-en un !</div></div>`
    : STATE.projects.map(p => {
        const pr = progress(p);
        const tmpl = TEMPLATES[p.type];
        return `<div class="proj-card" onclick="goPid(${p.id})">
          <div class="proj-card-head">
            <div class="proj-icon ${p.type}">${tmpl.icon}</div>
            <div><div class="proj-card-name">${esc(p.name)}</div><div class="proj-card-type">${tmpl.label}</div></div>
            <div class="proj-pct" style="margin-left:auto">${pr.pct}%</div>
          </div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pr.pct}%"></div></div>
          <div class="proj-stats">
            <span class="proj-stat-done">✓ ${pr.done} terminées</span>
            <span>${pr.total - pr.done} restantes</span>
          </div>
        </div>`;
      }).join('');

  const stBadge = st => ({ done:'sb-done',can:'sb-can',blocked:'sb-blocked',inprogress:'sb-prog' }[st]||'');
  const stLabel = st => ({ done:'✓ Terminé',can:'Peut démarrer',blocked:'Bloqué',inprogress:'En cours' }[st]||'');

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${STATE.projects.length}</div><div class="stat-label">Chantiers</div></div>
      <div class="stat-card"><div class="stat-val">${done}</div><div class="stat-label">Étapes terminées</div></div>
      <div class="stat-card"><div class="stat-val">${inprog}</div><div class="stat-label">En cours</div></div>
      <div class="stat-card"><div class="stat-val">${total?Math.round(done/total*100):0}%</div><div class="stat-label">Avancement global</div></div>

// ── PROJECT CHECKLIST ──
function renderProject(pid) {
  const p = getP(pid);
  if (!p) { goDash(); return; }
  syncStepState(p);
  const steps = effectiveSteps(p);
  const pr = progress(p);
  const tmpl = TEMPLATES[p.type];

  // Budget calc
  const deblList = steps.map(s => s.debl || 0);
  const totalDebl = deblList.reduce((a,v)=>a+v,0);
  let goUnl=0, ccUnl=0, paUnl=0;
  steps.forEach((s,i)=>{
    if(p.stepState[i]&&p.stepState[i].done && s.debl){
      if(s.phase==='go') goUnl+=s.debl;
      else if(s.phase==='couvert') ccUnl+=s.debl;
      else paUnl+=s.debl;
    }
  });
  const totalUnl = goUnl+ccUnl+paUnl;
  const remaining = Math.max(0, Math.round((100-totalDebl)*100)/100);

  const budgetHtml = totalDebl > 0 ? `
    <div class="budget-bar">
      <div class="budget-head">
        <span class="budget-title">💰 Budget débloqué</span>
        <div><span class="budget-val">${totalUnl.toFixed(1)}%</span> <span class="budget-max">/ ${totalDebl.toFixed(1)}% budget total</span></div>
      </div>
      <div class="budget-track">
        <div class="budget-seg" style="width:${totalDebl>0?goUnl/totalDebl*100:0}%;background:#e87a4a"></div>
        <div class="budget-seg" style="width:${totalDebl>0?ccUnl/totalDebl*100:0}%;background:#1e4a8a"></div>
        <div class="budget-seg" style="width:${totalDebl>0?paUnl/totalDebl*100:0}%;background:#1a7a4a"></div>
      </div>
      <div class="budget-legend">
        <div class="budget-leg"><div class="budget-leg-dot" style="background:#e87a4a"></div>GO ${goUnl.toFixed(1)}%</div>
        <div class="budget-leg"><div class="budget-leg-dot" style="background:#1e4a8a"></div>Clos couvert ${ccUnl.toFixed(1)}%</div>
        <div class="budget-leg"><div class="budget-leg-dot" style="background:#1a7a4a"></div>Parachèvement ${paUnl.toFixed(1)}%</div>
      </div>
      <div class="budget-toggle">
        <label class="toggle-sw">
          <input type="checkbox" ${p.customBudget?'checked':''} onchange="toggleBudget(${pid},this.checked)">
          <span class="toggle-sl"></span>
        </label>
        <span class="toggle-text">${p.customBudget
          ? `<strong>Mode manuel</strong> — ${totalDebl.toFixed(1)}% distribués, ${remaining.toFixed(1)}% restants`
          : '<strong>Mode automatique</strong> — % par défaut · activez pour personnaliser'}</span>
      </div>
    </div>` : '';

  const stepsHtml = steps.map((s, i) => {
    const ss = p.stepState[i] || {};
    const st = stepStatus(p, i);
    const numCls = {done:'done',inprogress:'inprogress',can:'can',blocked:''}[st]||'';
    const badgeCls = {done:'sb-done',can:'sb-can',blocked:'sb-blocked',inprogress:'sb-prog'}[st]||'';
    const badgeLbl = {done:'✓ Terminé',can:'Peut démarrer',blocked:'Ne peut pas démarrer',inprogress:'En cours'}[st]||'';

    const prereqsHtml = (s.prereqs||[]).map((pt,pi) => `
      <div class="prereq-item">
        <div class="prereq-check ${ss.checked&&ss.checked[pi]?'checked':''}" onclick="togglePrereq(${pid},${i},${pi})">${ss.checked&&ss.checked[pi]?'✓':''}</div>
        <div class="prereq-text ${ss.checked&&ss.checked[pi]?'checked':''}" onclick="togglePrereq(${pid},${i},${pi})">${esc(pt)}</div>
        <button class="prereq-del-btn" onclick="delPrereq(${pid},${i},${pi})">✕</button>
      </div>`).join('');

    const deblBadge = p.customBudget
      ? `<span class="debl-badge">💰<input class="debl-input" type="number" min="0" max="100" step="0.01" value="${(s.debl||0).toFixed(2)}" onclick="event.stopPropagation()" onchange="setDebl(${pid},${i},+this.value)">%</span>`
      : (s.debl > 0 ? `<span class="debl-badge">💰 ${s.debl}%</span>` : '');

    const btns = st === 'done'
      ? `<button class="step-btn step-btn-grey" onclick="markUndone(${pid},${i})">↩ Rouvrir</button>`
      : st === 'inprogress'
      ? `<button class="step-btn step-btn-grey" onclick="markUndone(${pid},${i})">↩ Rouvrir</button>
         <button class="step-btn step-btn-green" onclick="markDone(${pid},${i})">✓ Marquer terminé</button>`
      : st === 'can'
      ? `<button class="step-btn step-btn-blue" onclick="markInProgress(${pid},${i})">▶ Démarrer</button>`
      : '';

    const phTag = `<span class="phase-tag phase-${s.phase==='parachèvement'?'para':s.phase}">${s.phase}</span>`;

    return `<div class="step-block ${ss.open?'open':''}" id="sb_${pid}_${i}">
      <div class="step-header" onclick="toggleStep(${pid},${i})">
        <div class="step-move" onclick="event.stopPropagation()">
          <button class="move-btn" ${i===0?'disabled':''} onclick="moveStep(${pid},${i},-1)">▲</button>
          <button class="move-btn" ${i===steps.length-1?'disabled':''} onclick="moveStep(${pid},${i},1)">▼</button>
        </div>
        <div class="step-num ${numCls}">${i+1}</div>
        <div class="step-info">
          <div class="step-name">${esc(s.name)} ${deblBadge}</div>
          <div class="step-remark">${s.remark?esc(s.remark)+'':''} ${phTag}</div>
        </div>
        <div class="step-badge ${badgeCls}">${badgeLbl}</div>
        <button class="step-del-btn" onclick="event.stopPropagation();delStep(${pid},${i})" title="Supprimer">🗑</button>
        <div class="chevron">▼</div>
      </div>
      ${ss.open ? `<div class="step-body">
        <div class="prereq-list">${prereqsHtml}</div>
        <div class="add-prereq-row">
          <input class="add-prereq-inp" id="pri_${pid}_${i}" type="text" placeholder="+ Ajouter un prérequis…" onkeydown="if(event.key==='Enter')addPrereq(${pid},${i})">
          <button class="add-prereq-btn" onclick="addPrereq(${pid},${i})">+ Ajouter</button>
        </div>
        <label class="note-label">📝 Note de visite</label>
        <textarea class="note-inp" rows="2" placeholder="Ajouter une note…" oninput="setNote(${pid},${i},this.value)">${esc(ss.note||'')}</textarea>
        <div class="step-actions">${btns}</div>
      </div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="cl-header">
      <div class="cl-title-group">
        <div class="cl-type">${tmpl.icon} ${tmpl.label}</div>
        <div class="cl-name">${esc(p.name)}</div>
      </div>
      <div class="cl-actions">
        <button class="btn btn-ghost" onclick="goReport()">📈 Rapport</button>
        <button class="btn btn-ghost" onclick="goDash()">← Tableau de bord</button>
        <button class="btn btn-add" onclick="openAddStep(${pid})">➕ Étape</button>
      </div>
    </div>
    <div class="prog-overview">
      <div class="prog-overview-head">
        <span class="prog-overview-label">Avancement global</span>
        <span class="prog-overview-val">${pr.done} / ${pr.total} étapes terminées (${pr.pct}%)</span>
      </div>
      <div class="prog-main"><div class="prog-main-fill" style="width:${pr.pct}%"></div></div>
    </div>
    ${budgetHtml}
    ${stepsHtml}`;
}

// ── RAPPORT ──
function renderReport() {
  const m = document.getElementById('main');
  const totDone = STATE.projects.reduce((a,p)=>a+p.stepState.filter(s=>s.done).length,0);
  const totAll  = STATE.projects.reduce((a,p)=>a+effectiveSteps(p).length,0);
  const totIP   = STATE.projects.reduce((a,p)=>{syncStepState(p);return a+p.stepState.filter((ss,i)=>stepStatus(p,i)==='inprogress').length;},0);
  const totCan  = STATE.projects.reduce((a,p)=>{syncStepState(p);return a+p.stepState.filter((ss,i)=>stepStatus(p,i)==='can').length;},0);
  const totBlk  = STATE.projects.reduce((a,p)=>{syncStepState(p);return a+p.stepState.filter((ss,i)=>stepStatus(p,i)==='blocked').length;},0);
  const pct = totAll ? Math.round(totDone/totAll*100) : 0;

  const barHtml = STATE.projects.map(p => {
    const pr = progress(p);
    return `<div class="bar-row">
      <div class="bar-name" title="${esc(p.name)}">${esc(p.name)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pr.pct}%"></div></div>
      <div class="bar-pct">${pr.pct}%</div>
    </div>`;
  }).join('') || '<div style="font-size:13px;color:var(--ink3)">Aucun chantier.</div>';

  const notesHtml = STATE.projects.flatMap(p => {
    syncStepState(p);
    const steps = effectiveSteps(p);
    return p.stepState.map((ss,i)=>ss.note?{pname:p.name,sname:steps[i]?.name||'',note:ss.note}:null).filter(Boolean);
  }).map(n=>`<div class="alert-item">
    <div><div style="font-size:11px;color:var(--ink3)">${esc(n.pname)} — ${esc(n.sname)}</div><div style="font-size:12px;color:var(--ink2);margin-top:2px">${esc(n.note)}</div></div>
  </div>`).join('') || '<div style="font-size:13px;color:var(--ink3)">Aucune note enregistrée.</div>';

  m.innerHTML = `
    <div class="page-title">Rapport & Analyse</div>
    <div class="page-sub">Synthèse automatique · ${new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}</div>
    <div class="rapport-grid">
      <div class="rcard">
        <div class="rcard-title">Répartition globale</div>
        <div class="pie-wrap">
          <div class="pie-container"><canvas id="pieChart" width="130" height="130"></canvas>
            <div class="pie-center"><div class="pie-pct">${pct}%</div><div class="pie-pct-label">terminé</div></div>
          </div>
          <div class="pie-legend">
            <div class="leg-item"><div class="leg-dot" style="background:#1a7a4a"></div>Terminé<span class="leg-val">${totDone}</span></div>
            <div class="leg-item"><div class="leg-dot" style="background:#c06010"></div>En cours<span class="leg-val">${totIP}</span></div>
            <div class="leg-item"><div class="leg-dot" style="background:#1e4a8a"></div>Peut démarrer<span class="leg-val">${totCan}</span></div>
            <div class="leg-item"><div class="leg-dot" style="background:#8a1a1a"></div>Bloqué<span class="leg-val">${totBlk}</span></div>
          </div>
        </div>
      </div>
      <div class="rcard">
        <div class="rcard-title">Avancement par chantier</div>
        ${barHtml}
      </div>
    </div>
    <div class="rapport-full">
      <div class="rcard rapport-full">
        <div class="rcard-title">📝 Notes de visite</div>
        ${notesHtml}
      </div>
    </div>`;

  // Draw pie
  const canvas = document.getElementById('pieChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const segs = [{v:totDone,c:'#1a7a4a'},{v:totIP,c:'#c06010'},{v:totCan,c:'#1e4a8a'},{v:totBlk,c:'#8a1a1a'}];
  const cx=65,cy=65,r=56,inner=34;
  ctx.clearRect(0,0,130,130);
  if (!totAll) {
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#e3dfd5';ctx.fill();
  } else {
    let angle = -Math.PI/2;
    segs.forEach(s=>{
      if(!s.v)return;
      const slice=(s.v/totAll)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);
      ctx.closePath();ctx.fillStyle=s.c;ctx.fill();
      angle+=slice;
    });
  }
  ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

//  ACTIONS
// ════════════════════════════════════════════════════════
window.goDash    = ()=>{ STATE.view='dash'; STATE.pid=null; render(); };
window.goReport  = ()=>{ STATE.view='report'; STATE.pid=null; render(); };
window.goPid     = id=>{ STATE.view='project'; STATE.pid=id; render(); };

window.delProject = id => {
  if (!confirm('Supprimer ce chantier ?')) return;
  STATE.projects = STATE.projects.filter(p=>p.id!==id);
  if (STATE.pid===id) { STATE.view='dash'; STATE.pid=null; }
  save(); render(); toast('🗑 Chantier supprimé');
};

window.toggleStep = (pid,i) => {
  const p=getP(pid); syncStepState(p);
  p.stepState[i].open = !p.stepState[i].open;
  renderProject(pid);
};

window.togglePrereq = (pid,i,pi) => {
  const p=getP(pid); syncStepState(p);
  p.stepState[i].checked[pi] = !p.stepState[i].checked[pi];
  save(); render();
};

window.setNote = (pid,i,v) => {
  const p=getP(pid);
  p.stepState[i].note = v;
  if (!_syncing) { clearTimeout(window._noteTimer); window._noteTimer=setTimeout(save,800); }
};

window.markInProgress = (pid,i) => {
  const p=getP(pid); syncStepState(p);
  p.stepState[i].inprogress=true; p.stepState[i].done=false; p.stepState[i].open=true;
  save(); render(); toast('▶ Étape démarrée');
};
window.markDone = (pid,i) => {
  const p=getP(pid); syncStepState(p);
  p.stepState[i].done=true; p.stepState[i].inprogress=false; p.stepState[i].open=false;
  p.stepState[i].checked = p.stepState[i].checked.map(()=>true);
  save(); render(); toast('✓ Étape terminée');
};
window.markUndone = (pid,i) => {
  const p=getP(pid); syncStepState(p);
  p.stepState[i].done=false; p.stepState[i].inprogress=false; p.stepState[i].open=true;
  save(); render(); toast('↩ Étape réouverte');
};

window.moveStep = (pid,i,dir) => {
  const p=getP(pid); syncStepState(p);
  const steps=effectiveSteps(p);
  const ni=i+dir;
  if(ni<0||ni>=steps.length) return;
  // Build/update stepOrder
  if(!p.stepOrder||p.stepOrder.length!==steps.length)
    p.stepOrder=steps.map((_,idx)=>idx);
  [p.stepOrder[i],p.stepOrder[ni]]=[p.stepOrder[ni],p.stepOrder[i]];
  [p.stepState[i],p.stepState[ni]]=[p.stepState[ni],p.stepState[i]];
  p.stepState[ni].open=true;
  save(); renderProject(pid); toast('↕ Étape déplacée');
};

window.delStep = (pid,i) => {
  if(!confirm('Supprimer cette étape ?')) return;
  const p=getP(pid); syncStepState(p);
  const steps=effectiveSteps(p);
  const s=steps[i];
  if(s._custom) {
    // Remove from customSteps
    const ci=s._customIdx;
    p.customSteps.splice(ci,1);
  } else {
    // Mark base step as deleted
    if(!p.deletedBaseSteps) p.deletedBaseSteps=[];
    p.deletedBaseSteps.push(s._baseIdx);
  }
  // Remove stepOrder entry
  if(p.stepOrder){ p.stepOrder.splice(i,1); if(p.stepOrder.every((v,idx)=>v===idx)) p.stepOrder=null; }
  // Remove stepState entry
  p.stepState.splice(i,1);
  save(); render(); toast('🗑 Étape supprimée');
};

window.addPrereq = (pid,i) => {
  const inp=document.getElementById('pri_'+pid+'_'+i);
  if(!inp) return;
  const val=inp.value.trim(); if(!val){inp.focus();return;}
  const p=getP(pid); syncStepState(p);
  const steps=effectiveSteps(p);
  const s=steps[i];
  // Store override
  if(!p.prereqOverrides) p.prereqOverrides={};
  if(p.prereqOverrides[i]===undefined)
    p.prereqOverrides[i]=[...(s.prereqs||[])];
  p.prereqOverrides[i].push(val);
  // Ensure stepState checked array grows
  p.stepState[i].checked.push(false);
  inp.value='';
  save(); p.stepState[i].open=true; renderProject(pid); toast('✅ Prérequis ajouté');
};

window.delPrereq = (pid,i,pi) => {
  const p=getP(pid); syncStepState(p);
  const steps=effectiveSteps(p);
  const s=steps[i];
  if(!p.prereqOverrides) p.prereqOverrides={};
  if(p.prereqOverrides[i]===undefined)
    p.prereqOverrides[i]=[...(s.prereqs||[])];
  p.prereqOverrides[i].splice(pi,1);
  p.stepState[i].checked.splice(pi,1);
  save(); p.stepState[i].open=true; renderProject(pid); toast('🗑 Prérequis supprimé');
};

window.toggleBudget = (pid,v) => {
  const p=getP(pid); p.customBudget=v;
  save(); renderProject(pid);
  toast(v?'✏️ Mode manuel activé':'🔄 Mode automatique');
};

window.setDebl = (pid,i,val) => {
  const p=getP(pid); syncStepState(p);
  const steps=effectiveSteps(p);
  const currentTotal=steps.reduce((a,s,si)=>a+(si===i?0:(s.debl||0)),0);
  const max=Math.max(0,Math.round((100-currentTotal)*100)/100);
  const v=Math.min(isNaN(val)?0:Math.max(0,val),max);
  if(val>max) toast('⚠️ Max '+max.toFixed(2)+'% restants');
  if(!p.deblOverrides) p.deblOverrides={};
  p.deblOverrides[i]=v;
  save(); renderProject(pid);
};

// ── MODALS ──
window.openAddModal = () => {
  document.getElementById('addName').value='';
  document.getElementById('modalAddProject').classList.add('open');
  setTimeout(()=>document.getElementById('addName').focus(),80);
};

window.confirmAddProject = () => {
  const name=document.getElementById('addName').value.trim();
  if(!name) return;
  const type=document.getElementById('addType').value;
  const p = {
    id: Date.now(), name, type,
    createdAt: new Date().toISOString(),
    customBudget: false,
    stepState: [],
    customSteps: [],
    prereqOverrides: {},
    deblOverrides: {},
    deletedBaseSteps: [],
    stepOrder: null
  };
  syncStepState(p);
  STATE.projects.push(p);
  closeModal('modalAddProject');
  save(); render(); toast('🏗 Chantier créé');
};

let _addStepPid = null;
window.openAddStep = pid => {
  _addStepPid=pid;
  const p=getP(pid);
  document.getElementById('stepName').value='';
  document.getElementById('stepRemark').value='';
  document.getElementById('stepPrereqs').value='';
  document.getElementById('stepDebl').value='';
  document.getElementById('stepDeblField').style.display=p.customBudget?'block':'none';
  document.getElementById('modalAddStep').classList.add('open');
  setTimeout(()=>document.getElementById('stepName').focus(),80);
};

window.confirmAddStep = () => {
  const name=document.getElementById('stepName').value.trim();
  if(!name) return;
  const p=getP(_addStepPid);
  const prereqs=document.getElementById('stepPrereqs').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const phase=document.getElementById('stepPhase').value;
  const remark=document.getElementById('stepRemark').value.trim();
  let debl=0;
  if(p.customBudget){
    const steps=effectiveSteps(p);
    const used=steps.reduce((a,s)=>a+(s.debl||0),0);
    const max=Math.max(0,Math.round((100-used)*100)/100);
    debl=Math.min(parseFloat(document.getElementById('stepDebl').value)||0,max);
  }
  if(!p.customSteps) p.customSteps=[];
  p.customSteps.push({name,remark,debl,phase,prereqs});
  syncStepState(p);
  closeModal('modalAddStep');
  save(); render(); toast('✅ Étape ajoutée');
};

window.doExportExcel = () => {
  if (!STATE.projects || STATE.projects.length === 0) {
    toast('⚠️ Aucun projet à exporter'); return;
  }
  // Open selection modal
  const list = document.getElementById('exportProjectList');

    const tmpl = TEMPLATES[p.type];

    return `<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1.5px solid var(--paper3);border-radius:9px;cursor:pointer;background:var(--paper)">
      <input type="checkbox" id="expChk_${i}" checked style="width:16px;height:16px;cursor:pointer">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${p.name}</div>
        <div style="font-size:11px;color:var(--ink3)">${tmpl.label} · ${pr.done}/${pr.total} étapes</div>
      </div>
    </label>`;
  }).join('');
  document.getElementById('modalExportExcel').classList.add('open');
};

window.selectAllExport = (v) => {
  STATE.projects.forEach((_,i) => {
    const chk = document.getElementById('expChk_'+i);
    if (chk) chk.checked = v;
  });
};

window.confirmExportExcel = () => {
  const selected = STATE.projects.filter((_,i) => {
    const chk = document.getElementById('expChk_'+i);
    return chk && chk.checked;
  });
  if (selected.length === 0) { toast('⚠️ Aucun projet sélectionné'); return; }
  closeModal('modalExportExcel');
  doExportExcelFor(selected);
};

function doExportExcelFor(projects) {
  if (!projects || projects.length === 0) { toast('⚠️ Aucun projet à exporter'); return; }

  const WB = XLSX.utils.book_new();
  const today = new Date().toLocaleDateString('fr-FR');

  // ── Helper: cell styles ──
  const hStyle = { font:{bold:true,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'0F2137'}}, alignment:{horizontal:'center',vertical:'center'}, border:{bottom:{style:'medium',color:{rgb:'4A90D9'}}} };
  const subHStyle = { font:{bold:true,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'1A3A5C'}}, alignment:{horizontal:'left',vertical:'center'} };
  const numStyle = { font:{name:'Courier New',bold:true}, alignment:{horizontal:'center'} };
  const pctStyle = { font:{name:'Courier New',bold:true,color:{rgb:'1A7A4A'}}, alignment:{horizontal:'center'} };
  const doneStyle = { font:{bold:true,color:{rgb:'1A7A4A'}}, fill:{fgColor:{rgb:'E6F5ED'}} };
  const progStyle = { font:{bold:true,color:{rgb:'C06010'}}, fill:{fgColor:{rgb:'FFF3E6'}} };
  const blockedStyle = { font:{bold:true,color:{rgb:'8A1A1A'}}, fill:{fgColor:{rgb:'FDE8E8'}} };
  const canStyle = { font:{bold:true,color:{rgb:'1E4A8A'}}, fill:{fgColor:{rgb:'E6EEF8'}} };

  function statusStyle(st) {
    return {done:doneStyle,inprogress:progStyle,blocked:blockedStyle,can:canStyle}[st] || {};
  }
  function statusLabel(st) {
    return {done:'✓ Terminé',inprogress:'En cours',blocked:'Bloqué',can:'Peut démarrer'}[st] || st;
  }

  // ════════════════════════════
  //  TAB 1: OVERVIEW
  // ════════════════════════════
  const ovRows = [
    ["ChantierPro — Rapport d'avancement", '', '', '', today],
    [''],
    ['Projet','Type','Étapes totales','Terminées','% Avancement','Budget débloqué %','Créé le']
  ];
  projects.forEach(p => {
    syncStepState(p);
    const pr = progress(p);
    const steps = effectiveSteps(p);
    const totalDebl = steps.reduce((a,s)=>a+(s.debl||0),0);
    let unlocked = 0;
    steps.forEach((s,i)=>{ if(p.stepState[i]&&p.stepState[i].done) unlocked+=(s.debl||0); });
    const tmpl = TEMPLATES[p.type];
    ovRows.push([
      p.name,
      tmpl.label,
      pr.total,
      pr.done,
      pr.pct/100,
      totalDebl>0 ? unlocked/100 : 'N/A',
      p.createdAt ? new Date(p.createdAt).toLocaleDateString('fr-FR') : ''
    ]);
  });
  const wsOv = XLSX.utils.aoa_to_sheet(ovRows);
  wsOv['!cols'] = [{wch:30},{wch:18},{wch:14},{wch:12},{wch:14},{wch:18},{wch:14}];
  // Format % columns
  const ovLen = ovRows.length;
  for (let r=3; r<ovLen; r++) {
    const pctCell = XLSX.utils.encode_cell({r,c:4});
    const budCell = XLSX.utils.encode_cell({r,c:5});
    if (wsOv[pctCell]) wsOv[pctCell].z = '0%';
    if (wsOv[budCell] && wsOv[budCell].v !== 'N/A') wsOv[budCell].z = '0%';
  }
  XLSX.utils.book_append_sheet(WB, wsOv, '📊 Vue ensemble');

  // ════════════════════════════
  //  TAB 2: ÉTAPES DETAIL
  // ════════════════════════════
  const etRows = [
    ['Détail des étapes par projet', '', '', '', '', '', today],
    [''],
    ['Projet','N°','Étape','Phase','Prérequis cochés','Prérequis total','Statut','Note de visite','Budget %']
  ];
  projects.forEach(p => {
    syncStepState(p);
    const steps = effectiveSteps(p);
    const tmpl = TEMPLATES[p.type];
    // Project header row
    etRows.push([p.name + ' — ' + tmpl.label,'','','','','','','','']);
    steps.forEach((s,i) => {
      const ss = p.stepState[i] || {};
      const st = stepStatus(p,i);
      const prereqOk = (ss.checked||[]).filter(Boolean).length;
      const prereqTot = (s.prereqs||[]).length;
      etRows.push([
        '',
        i+1,
        s.name,
        s.phase,
        prereqOk,
        prereqTot,
        statusLabel(st),
        ss.note||'',
        s.debl>0 ? s.debl/100 : 0
      ]);
    });
    etRows.push(['']); // spacer
  });
  const wsEt = XLSX.utils.aoa_to_sheet(etRows);
  wsEt['!cols'] = [{wch:28},{wch:5},{wch:40},{wch:16},{wch:14},{wch:14},{wch:18},{wch:40},{wch:10}];
  // Format budget % column
  for (let r=3; r<etRows.length; r++) {
    const cell = XLSX.utils.encode_cell({r,c:8});
    if (wsEt[cell] && typeof wsEt[cell].v === 'number') wsEt[cell].z = '0.00%';
  }
  XLSX.utils.book_append_sheet(WB, wsEt, '📋 Étapes détail');

  // ════════════════════════════
  //  TAB 3: PRÉREQUIS
  // ════════════════════════════
  const prRows = [
    ['Détail des prérequis', '', '', '', today],
    [''],
    ['Projet','Étape','Prérequis','Coché']
  ];
  projects.forEach(p => {
    syncStepState(p);
    const steps = effectiveSteps(p);
    steps.forEach((s,i) => {
      const ss = p.stepState[i] || {};
      (s.prereqs||[]).forEach((pr2,pi) => {
        prRows.push([
          p.name,
          s.name,
          pr2,
          (ss.checked||[])[pi] ? 'Oui' : 'Non'
        ]);
      });
    });
  });
  const wsPr = XLSX.utils.aoa_to_sheet(prRows);
  wsPr['!cols'] = [{wch:28},{wch:40},{wch:55},{wch:8}];
  XLSX.utils.book_append_sheet(WB, wsPr, '✅ Prérequis');

  // ════════════════════════════
  //  TAB 4: BUDGET
  // ════════════════════════════
  const bdRows = [
    ['Synthèse budget par projet', '', '', '', today],
    [''],
    ['Projet','Phase','Étape','Budget %','Débloqué','Statut étape']
  ];
  projects.forEach(p => {
    syncStepState(p);
    const steps = effectiveSteps(p);
    const withBudget = steps.filter(s=>s.debl>0);
    if (withBudget.length === 0) return;
    const totalDebl = withBudget.reduce((a,s)=>a+s.debl,0);
    let unlocked=0;
    withBudget.forEach((s,idx)=>{ const i=steps.indexOf(s); if(p.stepState[i]&&p.stepState[i].done) unlocked+=s.debl; });
    bdRows.push([p.name+' — Total','','',totalDebl/100,unlocked/100,'']);
    steps.forEach((s,i) => {
      if (!s.debl) return;
      const ss = p.stepState[i]||{};
      const st = stepStatus(p,i);
      bdRows.push(['', s.phase, s.name, s.debl/100, ss.done?s.debl/100:0, statusLabel(st)]);
    });
    bdRows.push(['']);
  });
  const wsBd = XLSX.utils.aoa_to_sheet(bdRows);
  wsBd['!cols'] = [{wch:28},{wch:16},{wch:40},{wch:12},{wch:12},{wch:18}];
  for (let r=3; r<bdRows.length; r++) {
    ['3','4'].forEach(c => {
      const cell = XLSX.utils.encode_cell({r,c:parseInt(c)});
      if (wsBd[cell] && typeof wsBd[cell].v==='number') wsBd[cell].z='0.00%';
    });
  }
  XLSX.utils.book_append_sheet(WB, wsBd, '💰 Budget');

  // ════════════════════════════
  //  TAB 5: NOTES
  // ════════════════════════════
  const ntRows = [
    ['Notes de visite', '', '', today],
    [''],
    ['Projet','Étape','Phase','Note']
  ];
  let hasNotes = false;
  projects.forEach(p => {
    syncStepState(p);
    const steps = effectiveSteps(p);
    p.stepState.forEach((ss,i) => {
      if (!ss.note || !ss.note.trim()) return;
      hasNotes = true;
      ntRows.push([p.name, steps[i]?steps[i].name:'', steps[i]?steps[i].phase:'', ss.note]);
    });
  });
  if (!hasNotes) ntRows.push(['','','','Aucune note enregistrée.']);
  const wsNt = XLSX.utils.aoa_to_sheet(ntRows);
  wsNt['!cols'] = [{wch:28},{wch:40},{wch:16},{wch:60}];
  XLSX.utils.book_append_sheet(WB, wsNt, '📝 Notes');

  // ── SAVE ──
  const filename = 'ChantierPro_' + new Date().toISOString().slice(0,10) + '.xlsx';
  XLSX.writeFile(WB, filename);
  toast('📊 Excel exporté — ' + filename);
}

window.doSave = () => { save(); toast('💾 Sauvegardé'); };

window.doExport = () => {
  const b=new Blob([JSON.stringify({projects:STATE.projects},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='ChantierPro_'+new Date().toISOString().slice(0,10)+'.json';a.click();
};

window.doImport = () => {
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.projects){STATE.projects=d.projects;save();render();toast('✅ Importé');}
      }catch{toast('❌ Fichier invalide');}
    };r.readAsText(e.target.files[0]);
  };inp.click();
};

// ── CLOSE MODALS ON OVERLAY CLICK ──
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); });
});
document.getElementById('addName').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmAddProject(); });
document.getElementById('stepName').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmAddStep(); });

// ── BOOT ──
render();
</script>

    <div class="modal-field">
      <label class="modal-label">Choisir les projets à exporter</label>
      <div id="exportProjectList" style="display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;margin-top:4px"></div>

      <button onclick="selectAllExport(true)" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--paper3);background:var(--paper2);cursor:pointer;font-family:inherit">Tout sélectionner</button>
      <button onclick="selectAllExport(false)" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--paper3);background:var(--paper2);cursor:pointer;font-family:inherit">Tout désélectionner</button>

      <button class="modal-btn modal-btn-cancel" onclick="closeModal('modalExportExcel')">Annuler</button>

    </div>
  </div>
</div>
